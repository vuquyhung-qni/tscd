<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin TSCĐ – Chi cục Hải quan khu vực VIII</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

:root{
  --navy:#0d2340;
  --navy-light:#1e4d80;
  --gold:#c9a84c;
  --bg:#eaf0f8;
  --text:#1a2a3a;
  --muted:#5a7080;
  --border:#dde4ec;
  --shadow:0 2px 14px rgba(13,35,64,.09);
  --r:13px;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Be Vietnam Pro",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

.hd{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);
  padding:16px 14px;
  position:relative;
  overflow:hidden;
}

.hd::before{
  content:"";
  position:absolute;
  top:-40px;
  right:-40px;
  width:160px;
  height:160px;
  border-radius:50%;
  background:rgba(201,168,76,.13);
}

.hd-inner{
  max-width:900px;
  margin:0 auto;
  display:flex;
  align-items:center;
  min-height:62px;
  position:relative;
  z-index:2;
  gap: 10px;
  padding-left:18px;
}

.hd-logo{
  width:65px;
  height:65px;
  object-fit:contain;
  flex-shrink:0;
  filter:none;
}

.hd-text{
  flex:1;
  display:flex;
  flex-direction: column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hd-subtitle {
  font-size:clamp(0.85rem, 3.8vw, 1.35rem);
  font-weight:400;
  color:rgba(255, 255, 255, 0.85);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom: 2px;
}

.hd-title{
  font-size:clamp(0.85rem, 3.8vw, 1.35rem);
  font-weight:800;
  letter-spacing:0.5px;
  text-transform:uppercase;
  color:#fff;
  white-space: nowrap; /* Ép buộc không xuống dòng */
}

.main{
  max-width:900px;
  margin:0 auto;
  padding:16px 12px 28px;
}

.card{
  background:#fff;
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:18px;
}

.title{
  font-size:1.35rem;
  font-weight:800;
  color:var(--navy-light);
  text-transform:uppercase;
  border-bottom:3px solid var(--navy-light);
  padding-bottom:10px;
  margin-bottom:16px;
}

.row{
  margin-bottom:12px;
  line-height:1.55;
  font-size:1rem;
}

.label{font-weight:800;color:#1a2a3a;font-size:1rem;}

.value{color:#0057b8;font-weight:800;font-size:1rem;}

.asset-code{color:#0057b8;font-weight:800;font-size:1rem;}

.section{
  margin-top:18px;
  padding-top:14px;
  border-top:1px dashed var(--border);
}

.link{
  color:#0057b8;
  font-weight:800;
  text-decoration:none;
  border-bottom:1px dashed #0057b8;
}

.link:hover{
  color:#a87c20;
  border-bottom-color:#a87c20;
}

.footer{
  margin-top:22px;
  text-align:center;
  font-size:.82rem;
  color:var(--muted);
}

@media(max-width:600px){
  .hd-logo{width:42px;height:42px;}
  .card{padding:16px;}
  .title{font-size:1.15rem;}
  .row{font-size:.95rem;}
  .hd-title { white-space: normal; } /* Cho phép xuống dòng nếu màn hình quá nhỏ (dưới 350px) để không bị tràn màn hình */
}

</style>
</head>

<div class="main">
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div>Đang tải thông tin...</div>
    </div>
  </div>

<!-- Modal nhập mật khẩu -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:13px;padding:28px 24px;width:90%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.25);position:relative;">
    <div style="font-size:1.1rem;font-weight:800;color:#1e4d80;margin-bottom:6px;">🔒 Xác thực truy cập</div>
    <div style="font-size:.88rem;color:#5a7080;margin-bottom:18px;">Vui lòng nhập mật khẩu để xem hồ sơ tài sản.</div>
    <input id="modal-pwd" type="password" placeholder="Nhập mật khẩu..."
      style="width:100%;padding:10px 14px;border:1.5px solid #dde4ec;border-radius:8px;font-size:1rem;font-family:inherit;outline:none;margin-bottom:10px;"
      onkeydown="if(event.key==='Enter') xacNhan()">
    <div id="modal-err" style="color:#c0392b;font-size:.83rem;min-height:18px;margin-bottom:10px;"></div>
    <div style="display:flex;gap:10px;">
      <button onclick="dongModal()"
        style="flex:1;padding:10px;border:1.5px solid #dde4ec;border-radius:8px;background:#fff;font-size:.95rem;font-weight:600;cursor:pointer;color:#5a7080;">
        Huỷ
      </button>
      <button onclick="xacNhan()"
        style="flex:1;padding:10px;border:none;border-radius:8px;background:linear-gradient(135deg,#0d2340,#1e4d80);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;">
        Xác nhận
      </button>
    </div>
  </div>
</div>

<script>
  // ===== CẤU HÌNH =====
  var API_URL = 'https://script.google.com/macros/s/AKfycbynfGIZomw7IPKJQEHH7RT-3pgMWOcnFi4acdqn9xvVVG4TItAe4J4wN7My2uUgBBxzWA/exec';
  // ====================

  var _url = '';

  function xemHoSo(url) {
    _url = url;
    document.getElementById('modal-pwd').value = '';
    document.getElementById('modal-err').textContent = '';
    var overlay = document.getElementById('modal-overlay');
    overlay.style.display = 'flex';
    setTimeout(function(){ document.getElementById('modal-pwd').focus(); }, 100);
  }

  function dongModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }

  function xacNhan() {
    var pwd = document.getElementById('modal-pwd').value;
    if (pwd === 'Hqkv8@2026') {
      dongModal();
      window.open(_url, '_blank');
    } else {
      document.getElementById('modal-err').textContent = '❌ Mật khẩu không đúng, vui lòng thử lại.';
      document.getElementById('modal-pwd').select();
    }
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e){
    if (e.target === this) dongModal();
  });

  function has(v) { return v !== undefined && v !== null && String(v).trim() !== ''; }
  function r(v) {
    return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderTSCD(a) {
    var extraSection = '';
    var hasExtra = has(a['Nguồn gốc']) || has(a['Nhà thầu cung cấp']) || has(a['Thời hạn bảo hành']) || has(a['Thông tin bảo hành']) || has(a['Hồ sơ tài sản']);
    if (hasExtra) {
      extraSection = '<div class="section">'
        + (has(a['Nguồn gốc'])           ? '<div class="row"><span class="label">Nguồn gốc:</span> <span class="value">' + r(a['Nguồn gốc']) + '</span></div>' : '')
        + (has(a['Nhà thầu cung cấp'])   ? '<div class="row"><span class="label">Nhà thầu cung cấp:</span> <span class="value">' + r(a['Nhà thầu cung cấp']) + '</span></div>' : '')
        + (has(a['Thời hạn bảo hành'])   ? '<div class="row"><span class="label">Thời hạn bảo hành:</span> <span class="value">' + r(a['Thời hạn bảo hành']) + '</span></div>' : '')
        + (has(a['Thông tin bảo hành'])  ? '<div class="row"><span class="label">Thông tin bảo hành:</span> <span class="value">' + r(a['Thông tin bảo hành']) + '</span></div>' : '')
        + (has(a['Hồ sơ tài sản'])       ? '<div class="row"><span class="label">Hồ sơ tài sản:</span> <a class="link" href="#" onclick=\'xemHoSo("' + a['Hồ sơ tài sản'] + '");return false;\'>Xem hồ sơ tài sản</a></div>' : '')
        + '</div>';
    }

    document.getElementById('app').innerHTML =
      '<div class="card">'
      + '<div class="title">Thông tin tài sản cố định</div>'
      + '<div class="row"><span class="label">Tên TSCĐ:</span> <span class="value">' + r(a['TenTSCD'] || '') + '</span></div>'
      + (has(a['TenTSCD_daydu']) && a['TenTSCD_daydu'] !== a['TenTSCD'] ? '<div class="row"><span class="label">Tên đầy đủ:</span> <span class="value">' + r(a['TenTSCD_daydu']) + '</span></div>' : '')
      + (has(a['LoaiTS'])        ? '<div class="row"><span class="label">Loại tài sản:</span> <span class="value">' + r(a['LoaiTS']) + '</span></div>' : '')
      + '<div class="row"><span class="label">Mã TSCĐ:</span> <span class="value asset-code">' + r(a['MaTSCD'] || '') + '</span></div>'
      + (has(a['MaTKKTS'])       ? '<div class="row"><span class="label">Mã Tổng kiểm kê:</span> <span class="value">' + r(a['MaTKKTS']) + '</span></div>' : '')
      + (has(a['DONVISD'])       ? '<div class="row"><span class="label">Đơn vị sử dụng:</span> <span class="value">' + r(a['DONVISD']) + '</span></div>' : '')
      + (has(a['DVT'])           ? '<div class="row"><span class="label">Đơn vị tính:</span> <span class="value">' + r(a['DVT']) + '</span></div>' : '')
      + (has(a['NguyenGia'])     ? '<div class="row"><span class="label">Nguyên giá (đồng):</span> <span class="value">' + r(a['NguyenGia']) + '</span></div>' : '')
      + (has(a['GTGL'])          ? '<div class="row"><span class="label">Giá trị còn lại (đồng):</span> <span class="value">' + r(a['GTGL']) + '</span></div>' : '')
      + (has(a['NamSD'])         ? '<div class="row"><span class="label">Năm sử dụng:</span> <span class="value">' + r(a['NamSD']) + '</span></div>' : '')
      + (has(a['Tình hình hạch toán']) ? '<div class="row"><span class="label">Tình hình hạch toán:</span> <span class="value">' + r(a['Tình hình hạch toán']) + '</span></div>' : '')
      + (has(a['TinhtrangTS'])   ? '<div class="row"><span class="label">Tình trạng tài sản:</span> <span class="value">' + r(a['TinhtrangTS']) + '</span></div>' : '')
      + extraSection
      + '</div>';
  }

  var params = new URLSearchParams(window.location.search);
  var assetId = (params.get('id') || '').trim();

  if (!assetId) {
    document.getElementById('app').innerHTML = '<div class="error-box">⚠️ Thiếu mã TSCĐ. Vui lòng quét lại mã QR.</div>';
  } else {
    var cbName = 'cb_' + Date.now();
    window[cbName] = function(data) {
      delete window[cbName];
      document.getElementById('jsonp-script').remove();
      if (data.error) {
        document.getElementById('app').innerHTML = '<div class="error-box">❌ ' + data.error + '</div>';
      } else {
        renderTSCD(data);
      }
    };
    var s = document.createElement('script');
    s.id = 'jsonp-script';
    s.onerror = function() {
      document.getElementById('app').innerHTML = '<div class="error-box">❌ Không thể kết nối máy chủ. Vui lòng thử lại.</div>';
    };
    s.src = API_URL + '?id=' + encodeURIComponent(assetId) + '&callback=' + cbName;
    document.head.appendChild(s);
  }
</script>
